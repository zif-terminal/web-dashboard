server {
    # Loopback only — the edge proxy/tailscale terminate TLS in front of us.
    # Do NOT bind :3000 (live dashboard) or :3010 (edge).
    listen 127.0.0.1:3020;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Hashed asset filenames → immutable, cache hard.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # SPA fallback: every unknown route serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
